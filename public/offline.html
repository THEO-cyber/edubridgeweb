<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline · EduBridge</title>
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#0f1642; color:#fff; text-align:center; padding:24px; }
  .card { max-width:420px; }
  .logo { width:56px;height:56px;border-radius:14px;background:#1A237E;display:grid;place-items:center;font-weight:800;font-size:24px;margin:0 auto 20px; }
  h1 { font-size:24px; margin:0 0 8px; }
  p { color:rgba(255,255,255,.75); line-height:1.5; margin:0 0 24px; }
  button { background:#fff;color:#1A237E;border:0;border-radius:12px;padding:12px 24px;font-weight:700;font-size:15px;cursor:pointer; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">e</div>
    <h1>You're offline</h1>
    <p>EduBridge needs a connection to load new courses. Check your internet and try again — your downloaded pages still work.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
